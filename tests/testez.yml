# selene standard-library extension for TestEZ.
# TestEZ injects describe/it/expect/before/after globals into spec files at
# runtime. This std (layered on top of "roblox" via the tests-local selene.toml)
# teaches selene about them so spec files lint cleanly.
base: roblox
globals:
  describe:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  itFOCUS:
    args:
      - type: string
      - type: function
  itSKIP:
    args:
      - type: string
      - type: function
  fit:
    args:
      - type: string
      - type: function
  xit:
    args:
      - type: string
      - type: function
  FOCUS:
    args: []
  SKIP:
    args: []
  beforeEach:
    args:
      - type: function
  afterEach:
    args:
      - type: function
  beforeAll:
    args:
      - type: function
  afterAll:
    args:
      - type: function
  expect:
    args:
      - type: any
