[package]
name = "fog-studios/brainrot-inc"
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
description = "Brainrot Inc. — Roblox idle/collector game"

# Wally installs runtime dependencies into Packages/ which the Rojo project
# maps to ReplicatedStorage/Packages (see default.project.json). Require them
# at runtime via game.ReplicatedStorage.Packages.<Name>.
[dependencies]
# Cleanup / lifetime management. Used by client + UI rules for connection
# teardown (.claude/rules/client-scripts.md, ui-code.md).
Trove = "sleitnick/trove@1.8.0"

# Event-driven signal primitive for cross-system communication
# (.claude/rules/gameplay-systems.md event-driven pattern).
# Default chosen: stravant's GoodSignal. (Alternative: sleitnick/signal — see SETUP.md.)
Signal = "stravant/goodsignal@0.3.1"

# Dev-only dependencies install into DevPackages/ (not shipped to production
# place). Test runner per .claude/rules/tests.md.
[dev-dependencies]
TestEZ = "roblox/testez@0.4.1"
